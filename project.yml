name: SendaiGLab

options:
  bundleIdPrefix: jp.tohoku-gakuin.fshera
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # DEVELOPMENT_TEAM / CODE_SIGN_STYLE are intentionally NOT set here.
    # They come from `LocalSigning.xcconfig` (gitignored, per-contributor)
    # wired up in the SendaiGLab target below. See
    # LocalSigning.xcconfig.example for setup.

# Local Swift packages. Path is relative to the directory containing
# project.yml. xcodegen will import them as Local Packages and
# surface them in the Navigator.
packages:
  SDGCore:
    path: Packages/SDGCore
  SDGGameplay:
    path: Packages/SDGGameplay
  SDGUI:
    path: Packages/SDGUI
  SDGPlatform:
    path: Packages/SDGPlatform

targets:
  SendaiGLab:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    # Per-contributor signing credentials. This file is gitignored; see
    # LocalSigning.xcconfig.example for what to put in it.
    configFiles:
      Debug: LocalSigning.xcconfig
      Release: LocalSigning.xcconfig
    sources:
      - path: SendaiGLab
      # Bundled runtime data. Listed without `type: folder` so xcodegen
      # adds each file as an Xcode-processed resource rather than a raw
      # folder reference. This matters for:
      #   1. `.xcstrings` gets compiled into per-language `.lproj/*.strings`
      #      (folder reference would leave it as a raw file).
      #   2. iOS `.app` bundles are flat — resources live at the root.
      #      A `Resources/` subdirectory inside the .app confuses codesign
      #      (it treats the name as a nested bundle hint).
      # Files end up accessible via `Bundle.main.url(forResource:withExtension:)`
      # without a subdirectory parameter.
      - path: Resources
        buildPhase: resources
        excludes:
          - "**/.gitkeep"
          # GLBs are the intermediate nusamai output kept in the repo
          # for re-conversion; the app loads only the .usdz siblings
          # produced by Tools/plateau-pipeline/convert_environment_glbs.sh.
          # Bundling raw GLBs would cost ~16 MB of user download with
          # zero runtime benefit.
          - "Environment/*.glb"
    dependencies:
      - package: SDGCore
      - package: SDGGameplay
      - package: SDGUI
      - package: SDGPlatform
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.tohoku-gakuin.fshera.sendai-glab
        PRODUCT_NAME: SendaiGLab
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
        INFOPLIST_KEY_CFBundleDisplayName: SDG-Lab
        # Landscape-only game requires full-screen on iPad (disables Split View/Slide Over,
        # which would otherwise force us to support portrait).
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        # Orientation: LANDSCAPE ONLY (f.shera decision 2026-04-21).
        # This is a landscape-first game; portrait is NOT supported.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  SendaiGLab:
    build:
      targets:
        SendaiGLab: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
